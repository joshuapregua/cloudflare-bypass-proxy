services:
  cloudflare-proxy:
    build: .
    container_name: cloudflare-proxy
    environment:
      - PORT=3002
      - NODE_ENV=production
      - LOG_LEVEL=info
      # Optional: Set API key for authentication
      # - API_KEY=your-secret-api-key
    ports:
      - "3002:3002"
    restart: unless-stopped
    # Required for Puppeteer
    cap_add:
      - SYS_ADMIN
    shm_size: '2gb'
